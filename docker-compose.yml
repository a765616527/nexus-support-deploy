name: nexus-support

services:
  nexus-support-mysql:
    image: mysql:8.0
    container_name: nexus-support-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nexus-support}
      MYSQL_USER: ${MYSQL_USER:-nexus_support}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nexus_support_pass}
    volumes:
      - ${MYSQL_DATA_DIR:-/root/nexus-support/mysql}:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  nexus-support:
    image: ${APP_IMAGE:-arxuan123/nexus-support:latest}
    container_name: nexus-support-app
    pull_policy: always
    restart: unless-stopped
    depends_on:
      nexus-support-mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-nexus_support}:${MYSQL_PASSWORD:-nexus_support_pass}@nexus-support-mysql:3306/${MYSQL_DATABASE:-nexus-support}
      SHADOW_DATABASE_URL: mysql://${MYSQL_USER:-nexus_support}:${MYSQL_PASSWORD:-nexus_support_pass}@nexus-support-mysql:3306/${MYSQL_DATABASE:-nexus-support}_shadow
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-string}
      AES_SECRET: ${AES_SECRET:-replace-with-another-random-string}
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-超级管理员}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "3000:3000"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: nexus-support-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --interval
      - "60"
    depends_on:
      - nexus-support
